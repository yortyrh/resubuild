name: Setup monorepo
description: Install toolchain and restore cached node_modules (run actions/checkout first)

inputs:
  fail-on-cache-miss:
    description: Fail the job if the node_modules cache is missing
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6

    - uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Restore node_modules
      uses: actions/cache/restore@v4
      with:
        path: |
          node_modules
          apps/*/node_modules
          packages/*/node_modules
        key: pnpm-node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        fail-on-cache-miss: ${{ inputs.fail-on-cache-miss == 'true' }}
