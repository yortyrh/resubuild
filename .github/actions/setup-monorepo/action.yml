name: Setup monorepo
description: Install toolchain and optionally restore cached node_modules (run actions/checkout first)

inputs:
  restore-node-modules:
    description: Restore node_modules from cache before install
    required: false
    default: 'false'

outputs:
  node-modules-cache-hit:
    description: Whether the node_modules cache was restored
    value: ${{ steps.restore-node-modules.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6

    - uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Restore node_modules
      if: inputs.restore-node-modules == 'true'
      id: restore-node-modules
      uses: actions/cache/restore@v5
      with:
        path: |
          node_modules
          apps/*/node_modules
          packages/*/node_modules
        key: pnpm-node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
