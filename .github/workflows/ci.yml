name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-ci-placeholder-key
  NEXT_PUBLIC_API_URL: http://localhost:3001

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-monorepo
      - run: pnpm install --frozen-lockfile
      - uses: ./.github/actions/save-node-modules

  prettier:
    name: Prettier check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-monorepo
        with:
          fail-on-cache-miss: 'true'
      - run: pnpm format:check

  biome:
    name: Biome lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-monorepo
        with:
          fail-on-cache-miss: 'true'
      - run: pnpm lint

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-monorepo
        with:
          fail-on-cache-miss: 'true'
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.3.12
      - run: pnpm typecheck

  test:
    name: Unit tests (coverage)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-monorepo
        with:
          fail-on-cache-miss: 'true'
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.3.12
      - run: pnpm test

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-monorepo
        with:
          fail-on-cache-miss: 'true'
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.3.12
      - run: pnpm build
