name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-ci-placeholder-key
  NEXT_PUBLIC_API_URL: http://localhost:3001

jobs:
  # Collapsed from 5 parallel jobs to 2 to keep peak per-job RAM under ~3 GB
  # on a standard ubuntu-latest runner (~7 GB). See
  # openspec/specs/toolchain-parallelism-budget/spec.md
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-monorepo
        id: setup-monorepo
      - run: pnpm install --frozen-lockfile
        if: steps.setup-monorepo.outputs.node-modules-cache-hit != 'true'
      - run: pnpm format:check
      - run: pnpm lint
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.3.12
      - run: pnpm typecheck

  test-and-build:
    name: Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-monorepo
        id: setup-monorepo
      - run: pnpm install --frozen-lockfile
        if: steps.setup-monorepo.outputs.node-modules-cache-hit != 'true'
      - uses: ./.github/actions/save-node-modules
        if: steps.setup-monorepo.outputs.node-modules-cache-hit != 'true'
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.3.12
      - run: pnpm test
      - run: pnpm build
