# https://lefthook.dev/configuration/
pre-commit:
  piped: true
  commands:
    biome:
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}'
      run: pnpm exec biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
    prettier:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc,md,yml,yaml}'
      run: pnpm exec prettier --write --ignore-unknown {staged_files}
      stage_fixed: true

pre-push:
  commands:
    env-schema:check:
      # Fast drift gate: catches new KEY=value lines in
      # apps/{api,web}/.env.example that are not registered in
      # scripts/lib/env-prod-schema.mjs. Runs in <1s; fails fast before
      # the full verify pipeline (~5min) so the named error points at
      # the offending key. See openspec/specs/prod-env-bootstrap-helper.
      # {all_files} opts out of lefthook's "no matching push files" skip
      # so the check always runs.
      run: ': {all_files}; pnpm env-schema:check'
    verify:
      # Lefthook skips pre-push commands when it finds no push-scoped files.
      # {all_files} opts out of that skip so the full verify suite always runs.
      env:
        NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-ci-placeholder-key
        NEXT_PUBLIC_API_URL: http://localhost:3001
      run: ': {all_files}; pnpm verify'
