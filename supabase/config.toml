project_id = "resubuild"

[api]
enabled = true
port = 54321

[db]
port = 54322

[studio]
enabled = false
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:3000/reset-password",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/check-email",
]

[auth.email]
enable_signup = true
enable_confirmations = true

# GitHub OAuth — gated client-side by NEXT_PUBLIC_AUTH_GITHUB_OAUTH_ENABLED.
# The SPA only renders the "Continue with GitHub" button when that flag is
# the literal string "true". The actual provider liveness is controlled by
# this block: enabled = true plus real GITHUB_OAUTH_CLIENT_ID and
# GITHUB_OAUTH_SECRET in supabase/.env. The local-env-composer writes
# `github-oauth-stub` placeholders so `supabase start` boots; those stubs
# make signInWithOAuth fail with a "Sign-in failed" toast at click time —
# the SPA stays usable and the operator supplies real credentials to go
# live. See openspec/specs/auth-github-oauth/spec.md.
[auth.external.github]
enabled = true
client_id = "env(GITHUB_OAUTH_CLIENT_ID)"
secret = "env(GITHUB_OAUTH_SECRET)"
# The existing /auth/callback entry above is reused for the GitHub
# redirect — no new line in [auth].additional_redirect_urls is required.

# Google OAuth — gated client-side by NEXT_PUBLIC_AUTH_GOOGLE_OAUTH_ENABLED.
# The SPA only renders the "Continue with Google" button when that flag is
# the literal string "true". The actual provider liveness is controlled by
# this block: enabled = true plus real GOOGLE_OAUTH_CLIENT_ID and
# GOOGLE_OAUTH_SECRET in supabase/.env. The local-env-composer writes
# `google-oauth-stub` placeholders so `supabase start` boots; those stubs
# make signInWithOAuth fail with a "Sign-in failed" toast at click time —
# the SPA stays usable and the operator supplies real credentials to go
# live. See openspec/specs/auth-google-oauth/spec.md.
[auth.external.google]
enabled = true
client_id = "env(GOOGLE_OAUTH_CLIENT_ID)"
secret = "env(GOOGLE_OAUTH_SECRET)"
# The existing /auth/callback entry above is reused for the Google
# redirect — no new line in [auth].additional_redirect_urls is required.

# LinkedIn OAuth — gated client-side by NEXT_PUBLIC_AUTH_LINKEDIN_OAUTH_ENABLED.
# The SPA only renders the "Continue with LinkedIn" button when that flag is
# the literal string "true". The actual provider liveness is controlled by
# this block: enabled = true plus real LINKEDIN_OAUTH_CLIENT_ID and
# LINKEDIN_OAUTH_SECRET in supabase/.env. The local-env-composer writes
# `linkedin-oauth-stub` placeholders so `supabase start` boots; those stubs
# make signInWithOAuth fail with a "Sign-in failed" toast at click time —
# the SPA stays usable and the operator supplies real credentials to go
# live. See openspec/specs/auth-linkedin-oauth/spec.md.
[auth.external.linkedin_oidc]
enabled = true
client_id = "env(LINKEDIN_OAUTH_CLIENT_ID)"
secret = "env(LINKEDIN_OAUTH_SECRET)"
# The existing /auth/callback entry above is reused for the LinkedIn
# redirect — no new line in [auth].additional_redirect_urls is required.

[realtime]
enabled = false

[storage]
enabled = true
file_size_limit = "10MiB"

[storage.s3_protocol]
enabled = true

[storage.buckets.media]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "image/gif"]

[storage.buckets.mcp-exports]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["application/pdf", "text/html", "image/png", "application/json"]

[inbucket]
enabled = true

[edge_runtime]
enabled = false

[analytics]
enabled = false

[db.pooler]
enabled = false
