# docker-compose.prod.yml
#
# Release 1: cloud Supabase + docker compose target.
#
# Intentionally minimal scope — no TLS, no reverse proxy, no registry push.
# See openspec/specs/prod-env-bootstrap-helper/spec.md for the full spec and
# the follow-on release-1 changes that address TLS, reverse proxy, and
# registry push concerns.
#
# Prerequisites:
#   1. Run `pnpm setup:env:prod` (or use /opsx:setup-prod-env) to generate
#      .env.prod with real Supabase credentials.
#   2. Bring up the stack:
#      docker compose -f docker-compose.prod.yml --env-file .env.prod up
#
# The .env.prod file is gitignored — it is NOT committed to version control.

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Required: Next.js inlines NEXT_PUBLIC_* at build time, so it must be
        # passed as a build arg (not just a runtime env var) for the production
        # bundle to call the correct API URL and Supabase project. Without
        # NEXT_PUBLIC_SUPABASE_URL + NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY the
        # @supabase/ssr client throws "Your project's URL and API key are
        # required" the first time it tries to instantiate.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        # Auth feature flags — consumed by apps/web/src/lib/auth/features.ts at
        # build time. The runtime `env_file` below is too late; these must be
        # baked into the bundle for the SPA to render the matching controls.
        NEXT_PUBLIC_AUTH_FORGOT_PASSWORD_ENABLED: ${NEXT_PUBLIC_AUTH_FORGOT_PASSWORD_ENABLED}
        NEXT_PUBLIC_AUTH_EMAIL_VERIFICATION_ENABLED: ${NEXT_PUBLIC_AUTH_EMAIL_VERIFICATION_ENABLED}
        NEXT_PUBLIC_AUTH_PASSWORDLESS_ENABLED: ${NEXT_PUBLIC_AUTH_PASSWORDLESS_ENABLED}
        NEXT_PUBLIC_AUTH_GITHUB_OAUTH_ENABLED: ${NEXT_PUBLIC_AUTH_GITHUB_OAUTH_ENABLED}
        NEXT_PUBLIC_AUTH_GOOGLE_OAUTH_ENABLED: ${NEXT_PUBLIC_AUTH_GOOGLE_OAUTH_ENABLED}
        NEXT_PUBLIC_AUTH_LINKEDIN_OAUTH_ENABLED: ${NEXT_PUBLIC_AUTH_LINKEDIN_OAUTH_ENABLED}
        # OAuth redirectTo base — must match the value in [auth].additional_redirect_urls
        # in the Supabase project. Without this, social-login redirects fall back to
        # window.location.origin which may be http://localhost:... in containers.
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    ports:
      - '3000:3000'
    env_file:
      - .env.prod
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - resubuild-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3001:3000'
    env_file:
      - .env.prod
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/_health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      # Named volume so Chromium (Puppeteer) is not re-downloaded on every restart.
      # Puppeteer's default cache dir is $HOME/.cache/puppeteer; the container
      # HOME is /root, so we mount at /root/.cache/puppeteer.
      - resubuild-puppeteer-cache:/root/.cache/puppeteer
    networks:
      - resubuild-net

volumes:
  # Persists Puppeteer browser binaries across container restarts.
  resubuild-puppeteer-cache:

networks:
  # Minimal bridge network — no external exposure in this release.
  resubuild-net:
    driver: bridge
