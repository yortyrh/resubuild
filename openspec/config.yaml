schema: spec-driven

# Project context for AI-generated OpenSpec artifacts (proposal, design, tasks).
context: |
  Product: Resumind — monorepo for JSON Resume–based CVs ("Resumind").
  Stack: Turborepo + pnpm workspaces; Node 20+ (CI uses Node 22).
  apps/web: Next.js App Router under src/app/, session tokens via sessionStorage / Nest REST with CORS,
    client API helper in src/lib/api.ts calling the Nest API with Bearer tokens.
  apps/api: NestJS 11, ConfigModule, global ValidationPipe (whitelist, transform,
    forbidNonWhitelisted), CORS from CORS_ORIGIN, default port 3001.
  packages/schemas: official JSON Resume JSON Schema; packages/types: shared TS + meta helpers.
  Data: Supabase Postgres, public.cv table (id, user_id, title, data jsonb, timestamps);
    RLS restricts rows to auth.uid() = user_id; migration in supabase/migrations/.
  Testing: Vitest (web, types), Jest (api); root pnpm test (turbo); CI: parallel jobs for format:check,
    Biome lint, typecheck, test, build (see openspec/specs/monorepo-and-toolchain/spec.md).
  Conventions: unit tests colocated beside source; Biome + Prettier (+ tailwind class sort via Prettier);
    Lefthook pre-commit (Biome, Prettier on staged files) and pre-push (pnpm verify).

rules:
  proposal:
    - Reference existing specs in openspec/specs/ when describing capabilities; prefer new change folders under openspec/changes/ for deltas.
  tasks:
    - Point to concrete paths (apps/web/src, apps/api/src, packages/*, supabase/migrations).
